<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" fill="none">
  <!-- Tombstone/arch container -->
  <path d="M130 200 L130 100 Q130 50 200 50 Q270 50 270 100 L270 200" stroke="#4A4A58" stroke-width="0.8" fill="none" opacity="0.5"/>

  <!-- V mark - two converging lines -->
  <line x1="160" y1="80" x2="200" y2="175" stroke="#9A9A9A" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="240" y1="80" x2="200" y2="175" stroke="#C0C0CC" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Vermillion dot at convergence -->
  <circle cx="200" cy="175" r="3.5" fill="#C03030"/>
  <!-- Subtle glow behind dot -->
  <circle cx="200" cy="175" r="12" fill="url(#dotGlow)" opacity="0.6"/>

  <!-- VERMILLION text -->
  <text x="200" y="238" text-anchor="middle" fill="#D0D0DC" font-family="Cinzel, serif" font-size="28" letter-spacing="0.2em" font-weight="400">VERMILLION</text>

  <!-- AXIS text -->
  <text x="200" y="264" text-anchor="middle" fill="#C03030" font-family="Cinzel, serif" font-size="16" letter-spacing="0.25em" font-weight="600">AXIS</text>

  <!-- Horizontal rule -->
  <line x1="140" y1="278" x2="260" y2="278" stroke="url(#ruleGrad)" stroke-width="1"/>

  <!-- TECHNOLOGIES text -->
  <text x="200" y="300" text-anchor="middle" fill="#8E8EA0" font-family="Cinzel, serif" font-size="11" letter-spacing="0.35em" font-weight="400">TECHNOLOGIES</text>

  <!-- Gradient definitions -->
  <defs>
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF1744" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF1744" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ruleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C03030" stop-opacity="0"/>
      <stop offset="30%" stop-color="#C03030" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#C03030" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#C03030" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
